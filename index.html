<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>zu — 伝わりやすい形について</title>

<meta property="og:title" content="zu — 伝わりやすい形について">
<meta property="og:description" content="紙の上に文字を置いた時点で、それはもう図だ。見せて伝えるすべてを少し伝わりやすくするための、視覚の覚え書き。">
<meta property="og:type" content="website">

<!-- テーマの初期決定：描画前に data-theme を確定させ、一瞬ライトで光る（FOUC）のを防ぐ -->
<script>
  (function(){
    try{
      var saved = localStorage.getItem('zu-theme');
      var dark = saved ? saved === 'dark'
        : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    }catch(e){
      document.documentElement.setAttribute('data-theme', 'light');
    }
  })();
</script>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1d24;        /* 主たる文字 */
    --ink-soft:#5b6270;   /* 副次的な文字 */
    --line:#cdd3dc;       /* 罫・境界（生成りの地でも見える程度に） */
    --paper:#f7f6f2;      /* 紙の地 */
    --card:#ffffff;
    --accent:#e0533d;     /* 朱：ここぞの一点だけ */
    --accent-soft:#fbeae6;
    --calm:#3f7d6e;       /* 図の補助色（落ち着いた緑） */
    --calm-soft:#e6f0ec;
    /* 「濃い面に明るい字」を反転して使う要素（選択中チップ・トップへ戻る） */
    --strong:#1a1d24; --on-strong:#ffffff;
    /* フッターは両モードで落ち着いた濃い帯に保つ */
    --footer-bg:#1a1d24; --footer-ink:#cfd4dd; --footer-ink-soft:#7c8492;
  }
  /* ダークモード：紙を暗く、墨を明るく。図はCSS変数参照なので一緒に反転する。 */
  :root[data-theme="dark"]{
    --ink:#e7e9ee;
    --ink-soft:#a0a6b2;
    --line:#383d49;
    --paper:#15171c;
    --card:#1e2128;
    --accent:#f06a52;     /* 朱：暗所ではやや明るめに */
    --accent-soft:#3a221d;
    --calm:#5fa594;
    --calm-soft:#1d2e2a;
    --strong:#e7e9ee; --on-strong:#15171c;  /* 反転：明るいピルでアクティブ感を保つ */
    --footer-bg:#1e2128; --footer-ink:#cfd4dd; --footer-ink-soft:#7c8492;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Zen Kaku Gothic New',sans-serif;
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    margin:0; line-height:1.8;
    transition:background-color .3s ease, color .3s ease;
  }
  .maru{font-family:'Zen Maru Gothic',sans-serif;}
  .tnum{font-feature-settings:"tnum";}
  /* やわらかい角丸を全体の通奏低音にする（思想：現実に90°はない） */
  .soft{border-radius:18px;}
  .softer{border-radius:26px;}
  .card-shadow{box-shadow:0 1px 2px rgba(26,29,36,.04),0 8px 24px -12px rgba(26,29,36,.12);}
  .chip{transition:all .18s ease;}
  .chip:active{transform:scale(.96);}
  .tipcard{transition:transform .2s ease, box-shadow .2s ease;}
  .tipcard:hover{transform:translateY(-3px);box-shadow:0 4px 8px rgba(26,29,36,.05),0 18px 40px -16px rgba(26,29,36,.22);}
  ::selection{background:var(--accent-soft);}
  .focusable:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  .is-hidden{display:none!important;}
  /* 一覧カードの why は2行で抑え、図を主役に保ったまま「命」を覗かせる */
  .clamp2{
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;
  }
  /* モーダルの前後送り：端では押せないことを見た目でも伝える */
  #modal-prev[disabled],#modal-next[disabled]{opacity:.35;cursor:default;pointer-events:none;}
  /* スマホ：カテゴリを折り返さず横1列スクロールにし、占有する高さを抑える */
  @media (max-width:767px){
    #cats{
      flex-wrap:nowrap;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;            /* スクロールバーは隠す（chip だけ見せる） */
      /* px-6(1.5rem) ぶん外へ広げて端まで気持ちよくスクロールさせる */
      margin-left:-1.5rem; margin-right:-1.5rem;
      padding-left:1.5rem; padding-right:1.5rem;
      /* 右端をふっと薄めて「まだ続く」と気づかせる（末尾まで送ると .at-end で消える） */
      -webkit-mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent);
      mask-image:linear-gradient(to right,#000 calc(100% - 28px),transparent);
    }
    #cats.at-end{-webkit-mask-image:none;mask-image:none;}
    #cats::-webkit-scrollbar{display:none;}
    #cats>button{flex:0 0 auto;}      /* chip を縮めず横に流す */
  }
  /* 検索ヒット語のハイライト：朱の「点」ではなく、ごく薄い検索補助の地色 */
  mark.hl{background:var(--accent-soft);color:inherit;border-radius:3px;padding:0 .1em;}
  .fade-in{animation:fade .5s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .tipcard{cursor:pointer;}
  #modal:not(.hidden) #modal-backdrop,
  #history-modal:not(.hidden) #history-backdrop{animation:fade .2s ease both;}
  #modal:not(.hidden) #modal-panel,
  #history-modal:not(.hidden) #history-panel{animation:pop .22s ease both;}
  @keyframes pop{from{opacity:0;transform:translateY(12px) scale(.985);}to{opacity:1;transform:none;}}
  /* 前後送りの中身は、進む向きに合わせてすっと滑り込ませる */
  .slide-next{animation:slideNext .26s cubic-bezier(.22,.61,.36,1) both;}
  .slide-prev{animation:slidePrev .26s cubic-bezier(.22,.61,.36,1) both;}
  @keyframes slideNext{from{opacity:0;transform:translateX(26px);}to{opacity:1;transform:none;}}
  @keyframes slidePrev{from{opacity:0;transform:translateX(-26px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){
    .slide-next,.slide-prev,.fade-in{animation:none!important;}
  }
  /* 更新履歴：ピル型のミニマルなスクロールバー（角丸の内側に収める） */
  #history-scroll{scrollbar-width:thin;scrollbar-color:var(--line) transparent;}
  #history-scroll::-webkit-scrollbar{width:10px;}
  #history-scroll::-webkit-scrollbar-track{background:transparent;}
  #history-scroll::-webkit-scrollbar-thumb{
    background-color:var(--line);
    border-radius:999px;
    border:3px solid transparent;
    background-clip:padding-box;
  }
  #history-scroll::-webkit-scrollbar-thumb:hover{background-color:var(--ink-soft);}
  /* 「すべて」の章立て見出し：朱は使わず、墨と罫だけの静かな区切り。
     項目（特に目次の行）とはっきり見分くよう、丸ゴシックで大きく太く。 */
  .sec-head{
    display:flex;align-items:center;gap:.55rem;
    margin:2.5rem 0 1rem;padding-bottom:.55rem;
    border-bottom:2px solid var(--line);
  }
  .sec-head:first-child{margin-top:.5rem;}
  .sec-head .sec-label{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:1.4rem;color:var(--ink);}
  .sec-head .sec-count{font-size:.85rem;color:var(--ink-soft);opacity:.85;}
  /* 目次（list）表示：図を省いた1行。タイトル＋claimで素早く拾い読みする */
  .toc{display:flex;flex-direction:column;}
  .tocrow{
    display:flex;align-items:baseline;gap:.75rem;width:100%;text-align:left;
    padding:.7rem .25rem;border-bottom:1px solid var(--line);cursor:pointer;
    transition:background-color .15s ease;
  }
  .tocrow:hover{background:var(--card);}
  .tocrow .toc-title{font-weight:700;color:var(--ink);flex:0 0 auto;}
  .tocrow .toc-claim{color:var(--ink-soft);font-size:.9rem;flex:1 1 auto;min-width:0;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tocrow .toc-go{color:var(--ink-soft);opacity:.5;flex:0 0 auto;}
  @media (max-width:639px){
    .tocrow{flex-direction:column;gap:.15rem;}
    .tocrow .toc-claim{white-space:normal;font-size:.85rem;}
    .tocrow .toc-go{display:none;}
  }
  /* つながり（覚え書き同士のリンク）：彩度は足さず、アイコンと静かな言葉だけで種別を分ける */
  .ties{border-top:1px solid var(--line);}
  .ties-head{
    display:flex;align-items:center;gap:.4rem;
    font-size:.8rem;color:var(--ink-soft);margin-bottom:.5rem;letter-spacing:.04em;
  }
  .ties-list{display:flex;flex-direction:column;gap:.2rem;}
  .tie{
    display:flex;align-items:center;gap:.55rem;width:100%;text-align:left;
    padding:.5rem .55rem;border-radius:12px;cursor:pointer;
    color:var(--ink-soft);transition:background-color .15s ease;
  }
  .tie:hover{background:var(--paper);}
  .tie .tie-ic{flex:0 0 auto;opacity:.7;}
  .tie .tie-word{flex:0 0 auto;font-size:.78rem;opacity:.75;}
  .tie .tie-title{flex:1 1 auto;min-width:0;color:var(--ink);font-weight:700;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tie .tie-go{flex:0 0 auto;opacity:.4;}
  /* 固定バーの下端：スクロールする一覧が、すっと溶けて潜るように薄める */
  #filterbar::after{
    content:"";position:absolute;left:0;right:0;top:100%;height:18px;
    background:linear-gradient(var(--paper),transparent);pointer-events:none;
  }
  /* 表示切り替えトグル：選択側だけ濃い面に明るい字（chip と同じ反転表現） */
  .viewseg{display:inline-flex;gap:2px;padding:2px;border:1px solid var(--line);background:var(--card);}
  .viewseg button{display:inline-flex;align-items:center;gap:.35rem;padding:.35rem .7rem;border-radius:13px;
    font-size:.8rem;color:var(--ink-soft);background:transparent;border:none;cursor:pointer;transition:all .15s ease;}
  .viewseg button[aria-pressed="true"]{background:var(--strong);color:var(--on-strong);}
</style>
</head>
<body>

<!-- ヘッダー / ヒーロー -->
<header id="top" class="relative px-6 pt-10 pb-6 md:pt-12 md:pb-8 max-w-5xl xl:max-w-7xl mx-auto">
  <div class="absolute right-6 top-5 md:top-7 flex items-center gap-2">
    <button id="theme-toggle" type="button" aria-label="表示テーマを切り替える" aria-pressed="false"
      class="focusable chip inline-flex items-center justify-center soft p-2 border"
      style="color:var(--ink-soft);background:var(--card);border-color:var(--line);cursor:pointer">
      <i data-lucide="moon" class="w-4 h-4"></i>
    </button>
    <button id="history-open" type="button"

      <i data-lucide="history" class="w-4 h-4"></i>更新履歴
    </button>
  </div>
  <div class="flex items-baseline gap-3">
    <h1 id="hero-title" class="maru font-bold leading-none" style="font-size:clamp(3.2rem,11vw,5.5rem);letter-spacing:-.02em">zu</h1>
    <span class="inline-block w-2.5 h-2.5 rounded-full mb-2" style="background:var(--accent)"></span>
  </div>

  <p class="maru mt-1 font-bold" style="font-size:clamp(1.1rem,3.5vw,1.5rem);color:var(--ink)">

  </p>

  <p class="mt-3 max-w-2xl text-base md:text-lg" style="color:var(--ink-soft)">
    <span style="display:inline-block">見せて伝えるものは、ぜんぶ「図」。</span><span style="display:inline-block">伝わりやすくするコツを集めました。</span>
  </p>
</header>

<!-- 検索 + カテゴリ + 一覧の操作（総数・表示切替・ランダム）をひとまとめに固定する -->
<div id="filterbar" class="px-6 max-w-5xl xl:max-w-7xl mx-auto sticky top-0 z-20 pt-2 pb-3 md:pb-4" style="background:var(--paper)">
  <div class="flex items-center gap-2.5">
    <a id="mini-logo" href="#top" aria-label="ページの先頭へ戻る"
      class="is-hidden focusable chip shrink-0 inline-flex items-baseline gap-1 maru font-bold leading-none"
      style="font-size:1.6rem;color:var(--ink);text-decoration:none">
      zu<span class="inline-block w-1.5 h-1.5 rounded-full" style="background:var(--accent)"></span>
    </a>
    <div class="relative flex-1">
      <i data-lucide="search" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2" style="color:var(--ink-soft)"></i>
      <input id="q" type="text" placeholder="キーワードで探す（例：余白、角丸、色）"
        class="focusable w-full pl-12 pr-11 py-3 md:py-3.5 soft border bg-white text-base"
        style="border-color:var(--line)">
      <button id="q-clear" type="button" aria-label="検索をクリア"
        class="is-hidden focusable chip absolute right-3 top-1/2 -translate-y-1/2 inline-flex items-center justify-center w-7 h-7 soft"
        style="background:var(--paper);color:var(--ink-soft);border:none;cursor:pointer">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
    </div>
  </div>
  <div id="cats" class="flex flex-wrap gap-2 mt-2.5 md:mt-3"></div>
  <div class="flex flex-wrap items-center justify-between gap-x-3 gap-y-2 mt-3">
    <div id="count" class="text-sm" style="color:var(--ink-soft)"></div>
    <div class="flex items-center gap-2 shrink-0">
      <div id="view-seg" class="viewseg soft focusable" role="group" aria-label="一覧の表示を切り替える">
        <button id="view-card" type="button" aria-label="カード表示" aria-pressed="true">
          <i data-lucide="layout-grid" class="w-4 h-4"></i>カード
        </button>
        <button id="view-list" type="button" aria-label="目次表示" aria-pressed="false">
          <i data-lucide="list" class="w-4 h-4"></i>目次
        </button>
      </div>
      <button id="random" type="button"
        class="focusable chip inline-flex items-center gap-1.5 text-sm soft px-3 py-1.5 border"
        style="color:var(--ink-soft);background:var(--card);border-color:var(--line);cursor:pointer">
        <i data-lucide="shuffle" class="w-4 h-4"></i>ランダムに一枚
      </button>
    </div>
  </div>
</div>

<!-- Tips一覧 -->
<main class="px-6 max-w-5xl xl:max-w-7xl mx-auto pt-4 pb-8">
  <div id="grid" class="grid gap-5 md:grid-cols-2 xl:grid-cols-3"></div>
  <div id="empty" class="hidden text-center py-16" style="color:var(--ink-soft)">
    <i data-lucide="telescope" class="w-8 h-8 mx-auto mb-3"></i>
    <p>覚え書きが見つかりませんでした。別の言葉で探してみてください。</p>
  </div>
</main>

<!-- 詳細モーダル -->
<div id="modal" class="hidden fixed inset-0 z-50 flex items-start md:items-center justify-center p-4 md:p-6" aria-hidden="true">
  <div id="modal-backdrop" class="absolute inset-0" style="background:rgba(26,29,36,.45)"></div>
  <!-- 高さは覚え書きの量によらず一定にし、中身だけがスクロールする。
       前後送りで開き直しても大きさが変わらず、量が増えても読みやすい。 -->
  <div id="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title"
    class="relative softer card-shadow overflow-hidden flex flex-col w-full max-w-xl h-[85dvh] md:h-[82vh]" style="background:var(--card)">
    <button id="modal-close" aria-label="閉じる"
      class="focusable chip absolute right-3 top-3 z-10 inline-flex items-center justify-center w-9 h-9 soft border"
      style="background:var(--card);border-color:var(--line);color:var(--ink-soft)">
      <i data-lucide="x" class="w-5 h-5"></i>
    </button>
    <div id="modal-body" class="flex-1 overflow-y-auto overflow-x-hidden" style="padding-bottom:calc(env(safe-area-inset-bottom, 0px) + 4rem)"></div>
  </div>
  <!-- 前後送り：本文の長さに依存しないよう、画面下中央に固定で浮かせる -->
  <div id="modal-nav" class="fixed left-1/2 -translate-x-1/2 z-[60] flex items-center gap-1 p-1.5 rounded-full card-shadow border"
    style="bottom:calc(env(safe-area-inset-bottom, 0px) + 1.25rem);background:var(--card);border-color:var(--line)">
    <button id="modal-prev" type="button" aria-label="前の覚え書き"
      class="focusable chip shrink-0 whitespace-nowrap inline-flex items-center gap-1 pl-2.5 pr-3.5 py-1.5 rounded-full text-sm"

      <i data-lucide="chevron-left" class="w-4 h-4"></i>前へ

    <button id="modal-next" type="button" aria-label="次の覚え書き"
      class="focusable chip shrink-0 whitespace-nowrap inline-flex items-center gap-1 pl-3.5 pr-2.5 py-1.5 rounded-full text-sm"
      style="color:var(--ink);cursor:pointer">
      次へ<i data-lucide="chevron-right" class="w-4 h-4"></i>
    </button>
  </div>
</div>

<!-- 更新履歴モーダル（フッターから開く付加機能） -->

<button id="to-top" type="button" aria-label="ページの先頭へ戻る"

  style="background:var(--strong);color:var(--on-strong);border:none;cursor:pointer">

<script src="history.js"></script>
<script src="tips.js"></script>
<script>
/* データは外部ファイルに分離（ビルドなし・単体配信は維持）：
   history.js … 更新履歴（HISTORY） / tips.js … Tipsのたね（TIPS_*）。
   どちらも上の <script src> で先に読み込まれ、ここで参照する。 */
const CATEGORIES = [
  { id:"space",     label:"余白と配置",   icon:"move-diagonal" },
  { id:"hierarchy", label:"強弱をつける", icon:"arrow-up-narrow-wide" },
  { id:"color",     label:"色と濃淡",     icon:"palette" },
  { id:"text",      label:"文字を図として", icon:"type" },
  { id:"draw",      label:"線・矢印・グラフ", icon:"spline" },
  { id:"flow",      label:"進め方",         icon:"route" },
];


/* 6カテゴリの配列を1本につなぐ。順序はカテゴリ体系の並びに合わせる。 */
const TIPS = [].concat(
  typeof TIPS_space     !== "undefined" ? TIPS_space     : [],
  typeof TIPS_hierarchy !== "undefined" ? TIPS_hierarchy : [],
  typeof TIPS_color     !== "undefined" ? TIPS_color     : [],
  typeof TIPS_text      !== "undefined" ? TIPS_text      : [],
  typeof TIPS_draw      !== "undefined" ? TIPS_draw      : [],
  typeof TIPS_flow      !== "undefined" ? TIPS_flow      : []
);
/* =========================================================
   ▲▲▲ たねは以上。以下は描画ロジック（基本さわらない） ▲▲▲
   ========================================================= */

/* ---- 覚え書き同士のつながり（リンク） ----
   片側に links:[{to,rel}] を書けば、逆向きは自動で出る（両端に書かない）。
   rel は4種。色は足さず、アイコンと静かな言葉だけで種別を分ける（semantic-colorを濁さない）。
     echo    別の分野・側面で同じこと（対称）
     akin    関連が深い話（対称）
     tension 逆から見た／対になる話（対称）
     then    前後で効いてくる（向きあり：書いた側→to が「この次に」、to から見ると「その前に」）   */
const REL = {
  echo:    { icon:"repeat",      sym:true,  word:"別の顔で" },
  akin:    { icon:"link",        sym:true,  word:"近い話" },
  tension: { icon:"git-compare", sym:true,  word:"逆から見ると" },
  then:    { icon:"arrow-right", sym:false, word:"この次に",
             back:{ icon:"arrow-left", word:"その前に" } },
};
const REL_ORDER = ["then","echo","akin","tension"];

// 各idが受けている逆向きリンクを集める（描画前に1度だけ）
const BACKLINKS = (()=>{
  const map = {};
  TIPS.forEach(t=>(t.links||[]).forEach(l=>{
    (map[l.to] = map[l.to] || []).push({ to:t.id, rel:l.rel });
  }));
  return map;
})();

// あるTIPの「つながり」を表示用にまとめる（前向き＋逆向き、重複除去、種別順に整列）
function tiesFor(t){
  const seen = new Set(), out = [];
  const add = (to, rel, back)=>{
    if(!to || to===t.id || seen.has(to+"|"+rel)) return;
    const target = TIPS.find(x=>x.id===to), spec = REL[rel];
    if(!target || !spec) return;
    seen.add(to+"|"+rel);
    const view = (!spec.sym && back) ? spec.back : spec;
    out.push({ to, title:target.title, icon:view.icon, word:view.word, rel });
  };
  (t.links||[]).forEach(l=>add(l.to, l.rel, false));
  (BACKLINKS[t.id]||[]).forEach(l=>add(l.to, l.rel, true));
  out.sort((a,b)=>REL_ORDER.indexOf(a.rel)-REL_ORDER.indexOf(b.rel));
  return out;
}

let activeCat = "all";
let keyword = "";
let viewMode = "card";   // "card"=図つきカード / "list"=目次（図を省いた1行）
const catLabel = id => (CATEGORIES.find(c=>c.id===id)||{}).label || "";
const catIcon  = id => (CATEGORIES.find(c=>c.id===id)||{}).icon  || "tag";

// 検索語（keyword）の一致を <mark> で包む。プレーン文字列にだけ使う（SVGには使わない）。
const reEsc = s => s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
function hl(text){
  const k = keyword.trim();
  if(!k) return text;
  return text.replace(new RegExp("("+reEsc(k)+")","gi"),'<mark class="hl">$1</mark>');
}

// キーワードだけで一致するか（カテゴリは見ない）。chip の件数表示に使う。
function matchKeyword(t){
  const k = keyword.trim();
  if(!k) return true;
  const hay = (t.title+t.claim+t.why+t.apply+t.term+catLabel(t.cat)+(t.tags||[]).map(catLabel).join("")+(t.tags||[]).join("")).toLowerCase();
  return hay.includes(k.toLowerCase());
}

function renderCats(){
  const wrap = document.getElementById("cats");
  const pool = TIPS.filter(matchKeyword);
  const countOf = id => id==="all" ? pool.length : pool.filter(t=>t.cat===id).length;
  const mk = (id,label,icon,on)=>`
    <button data-cat="${id}" class="chip focusable shrink-0 whitespace-nowrap inline-flex items-center gap-1.5 px-3.5 py-2 soft text-sm border"
      style="${on
        ? 'background:var(--strong);color:var(--on-strong);border-color:var(--strong)'
        : 'background:var(--card);color:var(--ink);border-color:var(--line)'}">
      <i data-lucide="${icon}" class="w-4 h-4"></i>${label}<span class="tnum text-xs" style="opacity:.6">${countOf(id)}</span>
    </button>`;
  wrap.innerHTML =
    mk("all","すべて","layout-grid",activeCat==="all") +
    CATEGORIES.map(c=>mk(c.id,c.label,c.icon,activeCat===c.id)).join("");
  wrap.querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{activeCat=b.dataset.cat;renderCats();renderGrid();};
  });
  syncCatsEnd();
  lucide.createIcons();
}

function match(t){
  const okCat = activeCat==="all" || t.cat===activeCat;
  const k = keyword.trim();
  const hay = (t.title+t.claim+t.why+t.apply+t.term+catLabel(t.cat)+(t.tags||[]).map(catLabel).join("")+(t.tags||[]).join("")).toLowerCase();
  const okKey = !k || hay.includes(k.toLowerCase());
  return okCat && okKey;
}

function tagChips(t){
  const tags = t.tags || [];
  if(!tags.length) return "";
  return `<div class="px-6 pb-1 flex flex-wrap gap-1.5">` + tags.map(tg=>`
    <button data-jump="${tg}" class="chip focusable inline-flex items-center gap-1 px-2 py-0.5 soft text-[11px] border"
      style="background:var(--paper);color:var(--ink-soft);border-color:var(--line)">
      <i data-lucide="${catIcon(tg)}" class="w-3 h-3"></i>${catLabel(tg)}
    </button>`).join("") + `</div>`;
}

// 一覧カード：図を主役に、詳細（why/apply/タグ/用語）は隠す
function card(t){
  return `<article data-id="${t.id}" role="button" tabindex="0" aria-label="${t.title} — 詳しく読む"
    class="tipcard fade-in focusable soft card-shadow overflow-hidden" style="background:var(--card)">
    <div class="px-5 pt-4 flex items-center gap-1.5 text-xs" style="color:var(--ink-soft)">
      <i data-lucide="${catIcon(t.cat)}" class="w-3.5 h-3.5"></i>${catLabel(t.cat)}
    </div>
    <h3 class="maru font-bold px-5 mt-1" style="font-size:1.25rem">${hl(t.title)}</h3>
    <p class="px-5 mt-1 text-sm" style="color:var(--ink)">${hl(t.claim)}</p>
    <div class="mx-5 my-3 p-3 soft" style="background:var(--paper)">${t.visual}</div>
    <p class="px-5 text-sm leading-relaxed clamp2" style="color:var(--ink-soft)">${hl(t.why)}</p>
    <div class="px-5 pb-4 pt-2 flex items-center gap-1 text-xs" style="color:var(--ink-soft)">
      <span>詳しく読む</span><i data-lucide="chevron-right" class="w-3.5 h-3.5"></i>
    </div>
  </article>`;
}

// 章立て見出し：朱を使わず、墨と罫だけの静かな区切り（全体像のため）
function sectionHead(cat,count){
  return `<div class="sec-head">
    <i data-lucide="${catIcon(cat)}" class="w-5 h-5" style="color:var(--ink-soft)"></i>
    <span class="sec-label">${catLabel(cat)}</span>
    <span class="sec-count tnum">${count}</span>
  </div>`;
}

// 目次の1行：図を省き、タイトル＋claimで素早く拾い読みできる
function cardRow(t){
  return `<article data-id="${t.id}" role="button" tabindex="0" aria-label="${t.title} — 詳しく読む"
    class="tocrow focusable fade-in">
    <span class="toc-title maru">${hl(t.title)}</span>
    <span class="toc-claim">${hl(t.claim)}</span>
    <i data-lucide="chevron-right" class="w-4 h-4 toc-go"></i>
  </article>`;
}

// つながり（モーダル内）：関連する覚え書きへの導線。なければ何も出さない
function tiesBlock(t){
  const ties = tiesFor(t);
  if(!ties.length) return "";
  const rows = ties.map(x=>`
    <button data-tie="${x.to}" class="tie focusable" aria-label="${x.word} ${x.title} へ移る">
      <i data-lucide="${x.icon}" class="w-3.5 h-3.5 tie-ic"></i>
      <span class="tie-word">${x.word}</span>
      <span class="tie-title maru">${x.title}</span>
      <i data-lucide="chevron-right" class="w-3.5 h-3.5 tie-go"></i>
    </button>`).join("");
  return `<div class="ties mx-6 mt-5 pt-4">
    <div class="ties-head"><i data-lucide="waypoints" class="w-3.5 h-3.5"></i>つながり</div>
    <div class="ties-list">${rows}</div>
  </div>`;
}

// 詳細（モーダル内）：全項目を表示
function detail(t){
  return `
    <div class="px-6 pt-6 flex items-center gap-1.5 text-xs" style="color:var(--ink-soft)">
      <i data-lucide="${catIcon(t.cat)}" class="w-3.5 h-3.5"></i>${catLabel(t.cat)}
    </div>
    <h3 id="modal-title" class="maru font-bold px-6 mt-1" style="font-size:1.5rem">${hl(t.title)}</h3>
    <p class="px-6 mt-1 text-base" style="color:var(--ink)">${hl(t.claim)}</p>
    <div class="mx-6 my-4 p-4 soft" style="background:var(--paper)">${t.visual}</div>
    <p class="px-6 text-sm md:text-base leading-relaxed" style="color:var(--ink)">${hl(t.why)}</p>
    <div class="px-6 mt-4 pb-1 flex items-start gap-2">
      <i data-lucide="check" class="w-4 h-4 mt-1 shrink-0" style="color:var(--calm)"></i>
      <p class="text-sm md:text-base" style="color:var(--ink-soft)">${hl(t.apply)}</p>
    </div>
    ${tagChips(t)}
    ${tiesBlock(t)}
    ${t.term?`<p class="px-6 pb-6 pt-2 text-xs" style="color:var(--ink-soft)">用語：${t.term}</p>`:`<div class="pb-6"></div>`}
  `;
}

// いま絞り込まれている一覧。モーダルの前後送りはこの並びをたどる。
let currentList = [];

function renderGrid(){
  currentList = TIPS.filter(match);
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const count = document.getElementById("count");
  const item = viewMode==="list" ? cardRow : card;
  // カード表示はレスポンシブグリッド、目次表示は1列。区画ごとに付け外しする。
  const gridCls = "grid gap-5 md:grid-cols-2 xl:grid-cols-3";
  if(activeCat==="all"){
    // 「すべて」：カテゴリで章立てして全体像を見せる（0件の区画は出さない）
    grid.className = "";
    grid.innerHTML = CATEGORIES.map(c=>{
      const items = currentList.filter(t=>t.cat===c.id);
      if(!items.length) return "";
      const body = viewMode==="list"
        ? `<div class="toc">${items.map(item).join("")}</div>`
        : `<div class="${gridCls}">${items.map(item).join("")}</div>`;
      return sectionHead(c.id, items.length) + body;
    }).join("");
  } else {
    // 特定カテゴリ：見出しは冗長なのでフラットに並べる
    grid.className = viewMode==="list" ? "toc" : gridCls;
    grid.innerHTML = currentList.map(item).join("");
  }
  empty.classList.toggle("hidden", currentList.length>0);
  count.textContent = `${currentList.length} 件の覚え書き`;
  // ランダムに一枚：選べる候補があるときだけ出す
  document.getElementById("random").classList.toggle("is-hidden", currentList.length===0);
  grid.querySelectorAll("article[data-id]").forEach(c=>{
    c.onclick=()=>openTip(c.dataset.id);
    c.onkeydown=e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); openTip(c.dataset.id); } };
  });
  writeFilterToURL();
  lucide.createIcons();
}

// 詳細モーダル
const modal = document.getElementById("modal");
const modalBody = document.getElementById("modal-body");
const modalPrev = document.getElementById("modal-prev");
const modalNext = document.getElementById("modal-next");
const modalPos  = document.getElementById("modal-pos");
let lastFocused = null;
let currentId = null;   // いま開いている覚え書き

/* ---- URL（共有リンク）まわり ----
   絞り込みは ?cat=&q= に、開いている詳細は #tip=id に残す。
   リロード・ブックマーク・共有で、その状態を復元できるようにする。 */
function tipIdFromHash(){
  const m = location.hash.match(/tip=([\w-]+)/);
  return m ? m[1] : null;
}
function writeFilterToURL(){
  const p = new URLSearchParams();
  if(activeCat!=="all") p.set("cat", activeCat);
  if(keyword.trim())    p.set("q", keyword.trim());
  const qs = p.toString();
  history.replaceState(history.state, "", location.pathname + (qs?("?"+qs):"") + location.hash);
}
function baseURL(){ return location.pathname + location.search; }

// 詳細を実際に描いて見せる（履歴操作はしない）。dir>0=次へ / dir<0=前へ / 0=新規に開く
function showModal(id, dir=0){
  const t = TIPS.find(x=>x.id===id);
  if(!t) return;
  currentId = id;
  modalBody.innerHTML = detail(t);
  // 進む向きに合わせて中身を滑り込ませる（新規に開くときはパネルの pop に任せる）
  modalBody.classList.remove("slide-next","slide-prev");
  if(dir){ void modalBody.offsetWidth; modalBody.classList.add(dir>0?"slide-next":"slide-prev"); }
  modal.classList.remove("hidden");
  modal.setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
  lucide.createIcons();
  // モーダル内のタグから絞り込みジャンプ
  modalBody.querySelectorAll("button[data-jump]").forEach(b=>{
    b.onclick=()=>{
      activeCat=b.dataset.jump; keyword="";
      qInput.value=""; syncClear();
      hideModal();
      history.replaceState(null,"",location.pathname);  // 詳細#tip と旧クエリを消す（renderGridが?cat=を書き直す）
      renderCats(); renderGrid();
      window.scrollTo({top:0,behavior:"smooth"});
    };
  });
  // つながりから別の覚え書きへ移る（履歴を積むので「戻る」で元の一枚に戻れる）
  modalBody.querySelectorAll("button[data-tie]").forEach(b=>{
    b.onclick=()=>openTip(b.dataset.tie);
  });
  // 前後送りの状態を更新
  const idx = currentList.findIndex(x=>x.id===id);
  const has = idx>=0;
  modalPrev.disabled = !has || idx<=0;
  modalNext.disabled = !has || idx>=currentList.length-1;
  modalPos.textContent = has ? `${idx+1} / ${currentList.length}` : "";
  modalBody.scrollTop=0;
  document.getElementById("modal-close").focus();
}
function hideModal(){
  if(modal.classList.contains("hidden")) return;
  modal.classList.add("hidden");
  modal.setAttribute("aria-hidden","true");
  document.body.style.overflow="";
  currentId = null;
  if(lastFocused) lastFocused.focus();
}

// 一覧から開く（履歴を1つ積むので、ブラウザの「戻る」で閉じられる）
function openTip(id){
  if(!TIPS.some(x=>x.id===id)) return;
  // モーダルが閉じているときだけ開き元を覚える（つながりを辿っても元の一枚へ戻れるように）
  if(modal.classList.contains("hidden")) lastFocused = document.activeElement;
  history.pushState({tip:id,pushed:true}, "", baseURL().replace(/#.*$/,"") + "#tip=" + id);
  showModal(id);
}
// 前後送り：同じ詳細表示のなかでの移動なので履歴は積み替えるだけ（pushed の素性は保つ）
function navTip(id, dir){
  const pushed = !!(history.state && history.state.pushed);
  history.replaceState({tip:id,pushed}, "", baseURL().replace(/#.*$/,"") + "#tip=" + id);
  showModal(id, dir);
}
// 閉じる：自分で積んだ履歴があるときだけ戻す。共有リンク直開きでは自前で閉じる（サイトから出てしまわない）
function closeModal(){
  if(modal.classList.contains("hidden")) return;
  if(history.state && history.state.pushed){ history.back(); }
  else { hideModal(); history.replaceState(null,"",baseURL().replace(/#.*$/,"")); }
}
function stepTip(dir){
  const idx = currentList.findIndex(x=>x.id===currentId);
  if(idx<0) return;
  const next = idx + dir;
  if(next<0 || next>=currentList.length) return;
  navTip(currentList[next].id, dir);
}
modalPrev.onclick=()=>stepTip(-1);
modalNext.onclick=()=>stepTip(1);

// ブラウザの戻る/進むで URL の #tip に追従する
window.addEventListener("popstate", ()=>{
  const id = tipIdFromHash();
  if(id && TIPS.some(x=>x.id===id)) showModal(id);
  else hideModal();
});

document.getElementById("modal-close").onclick=closeModal;
document.getElementById("modal-backdrop").onclick=closeModal;

// 更新履歴モーダル
const historyModal = document.getElementById("history-modal");
const historyBody = document.getElementById("history-body");
let lastFocusedHistory = null;

function renderHistory(){
  historyBody.innerHTML = HISTORY.map((h,i)=>{
    const last = i===HISTORY.length-1;
    return `
    <div class="${last?'':'pb-5 mb-5'}" style="${last?'':'border-bottom:1px solid var(--line)'}">
      <p class="maru font-bold text-xs tnum" style="color:var(--calm)">${h.date}</p>
      <ul class="mt-2 space-y-1.5">
        ${h.items.map(it=>`<li class="flex items-start gap-2 text-xs md:text-sm leading-relaxed" style="color:var(--ink)">
          <span class="inline-block w-1 h-1 rounded-full mt-2 shrink-0" style="background:var(--line)"></span>
          <span>${it}</span>
        </li>`).join("")}
      </ul>
    </div>`;
  }).join("");
}

function openHistory(){
  lastFocusedHistory = document.activeElement;
  renderHistory();
  historyModal.classList.remove("hidden");
  historyModal.setAttribute("aria-hidden","false");
  document.body.style.overflow="hidden";
  lucide.createIcons();
  document.getElementById("history-scroll").scrollTop=0;
  document.getElementById("history-close").focus();
}
function closeHistory(){
  if(historyModal.classList.contains("hidden")) return;
  historyModal.classList.add("hidden");
  historyModal.setAttribute("aria-hidden","true");
  document.body.style.overflow="";
  if(lastFocusedHistory) lastFocusedHistory.focus();
}
document.getElementById("history-open").onclick=openHistory;
document.getElementById("history-close").onclick=closeHistory;
document.getElementById("history-backdrop").onclick=closeHistory;

// モーダルが開いている間、Tab を中だけで巡回させる（背後に抜けさせない）
function trapTab(e, container){
  if(e.key!=="Tab") return;
  const sel = 'a[href],button:not([disabled]),input,[tabindex]:not([tabindex="-1"])';
  const list = Array.from(container.querySelectorAll(sel)).filter(el=>el.offsetParent!==null);
  if(!list.length) return;
  const first = list[0], last = list[list.length-1];
  if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
  else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
}

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ closeModal(); closeHistory(); return; }
  // 詳細を開いている間は ← → で前後の覚え書きへ
  if(!modal.classList.contains("hidden")){
    if(e.key==="ArrowLeft"){ e.preventDefault(); stepTip(-1); }
    else if(e.key==="ArrowRight"){ e.preventDefault(); stepTip(1); }
    trapTab(e, modal);
  } else if(!historyModal.classList.contains("hidden")){
    trapTab(e, historyModal);
  }
});

// 検索：入力中はクリアボタンを出す
const qInput = document.getElementById("q");
const qClear = document.getElementById("q-clear");
function syncClear(){ qClear.classList.toggle("is-hidden", !qInput.value); }
// 入力のたびにカテゴリchipの件数も更新する
qInput.addEventListener("input",e=>{ keyword=e.target.value; syncClear(); renderCats(); renderGrid(); });
qClear.onclick=()=>{ qInput.value=""; keyword=""; syncClear(); renderCats(); renderGrid(); qInput.focus(); };

// 表示切り替え（カード / 目次）：選択を localStorage に保存（テーマと同型）
const viewCardBtn = document.getElementById("view-card");
const viewListBtn = document.getElementById("view-list");
function paintViewSeg(){
  viewCardBtn.setAttribute("aria-pressed", String(viewMode==="card"));
  viewListBtn.setAttribute("aria-pressed", String(viewMode==="list"));
}
function setView(mode){
  if(mode!=="card" && mode!=="list") return;
  if(mode===viewMode){ return; }
  viewMode = mode;
  try{ localStorage.setItem("zu-view", mode); }catch(e){}
  paintViewSeg();
  renderGrid();
}
viewCardBtn.onclick=()=>setView("card");
viewListBtn.onclick=()=>setView("list");

// ランダムに一枚：いま絞り込まれている並びから無作為に開く
document.getElementById("random").onclick=()=>{
  if(!currentList.length) return;
  openTip(currentList[Math.floor(Math.random()*currentList.length)].id);
};

// カテゴリ帯：末尾まで送ったら右端フェードを消す（.at-end）
const catsEl = document.getElementById("cats");
function syncCatsEnd(){
  const atEnd = catsEl.scrollLeft + catsEl.clientWidth >= catsEl.scrollWidth - 2;
  catsEl.classList.toggle("at-end", atEnd);
}
catsEl.addEventListener("scroll", syncCatsEnd, {passive:true});
window.addEventListener("resize", syncCatsEnd, {passive:true});

// スクロール中だけ：検索窓の左のロゴと、右下のトップへ戻るボタンを出す
const miniLogo = document.getElementById("mini-logo");
const toTop = document.getElementById("to-top");
function syncScrollUI(){
  const show = (window.scrollY || document.documentElement.scrollTop) > 180;
  miniLogo.classList.toggle("is-hidden", !show);
  toTop.classList.toggle("is-hidden", !show);
}
function gotoTop(){ window.scrollTo({top:0,behavior:"smooth"}); }
miniLogo.onclick=e=>{ e.preventDefault(); gotoTop(); };
toTop.onclick=gotoTop;
window.addEventListener("scroll",syncScrollUI,{passive:true});
syncScrollUI();

// 起動時：URL から絞り込みと開いている詳細を復元する（共有リンク・リロード対応）
(function restoreFromURL(){
  const p = new URLSearchParams(location.search);
  const cat = p.get("cat");
  if(cat && (cat==="all" || CATEGORIES.some(c=>c.id===cat))) activeCat = cat;
  const q = p.get("q");
  if(q){ keyword = q; qInput.value = q; syncClear(); }
  // 表示の好み（カード/目次）を復元（URLには載せず localStorage のみ）
  try{ const v = localStorage.getItem("zu-view"); if(v==="list"||v==="card") viewMode = v; }catch(e){}
  paintViewSeg();
})();

renderCats();
renderGrid();

// URL に #tip=id があれば、その詳細を開いた状態で始める
(function openTipFromURL(){
  const id = tipIdFromHash();
  if(id && TIPS.some(x=>x.id===id)){
    lastFocused = document.body;
    if(!(history.state && history.state.tip)) history.replaceState({tip:id},"",location.href);
    showModal(id);
  }
})();

// テーマ切り替え：右上のボタンで data-theme を反転し、選択を localStorage に保存する。
// 初期値は <head> のインラインスクリプトが描画前に決めている（FOUC防止）。
(function setupTheme(){
  const root = document.documentElement;
  const btn = document.getElementById("theme-toggle");
  const meta = document.querySelector('meta[name="theme-color"]');
  function paint(){
    const dark = root.getAttribute("data-theme") === "dark";
    // ダーク時は「明るくする」太陽、ライト時は「暗くする」月を見せる
    btn.querySelector("i").setAttribute("data-lucide", dark ? "sun" : "moon");
    btn.setAttribute("aria-pressed", String(dark));
    btn.setAttribute("aria-label", dark ? "ライトモードに切り替える" : "ダークモードに切り替える");
    if(meta) meta.setAttribute("content", dark ? "#15171c" : "#f7f6f2");
    lucide.createIcons();
  }
  btn.addEventListener("click", ()=>{
    const dark = root.getAttribute("data-theme") !== "dark";
    root.setAttribute("data-theme", dark ? "dark" : "light");
    try{ localStorage.setItem("zu-theme", dark ? "dark" : "light"); }catch(e){}
    paint();
  });
  paint();
})();

lucide.createIcons();
</script>
