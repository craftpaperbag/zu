<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>zu — 伝わりやすい形について</title>
<meta name="description" content="紙の上に文字を置いた時点で、それはもう図だ。見せて伝えるすべてを少し伝わりやすくするための、視覚の覚え書き。">
<meta property="og:title" content="zu — 伝わりやすい形について">
<meta property="og:description" content="紙の上に文字を置いた時点で、それはもう図だ。見せて伝えるすべてを少し伝わりやすくするための、視覚の覚え書き。">

<style>
  :root{
    --ink:#1a1d24;        /* 主たる文字 */
    --ink-soft:#5b6270;   /* 副次的な文字 */
    --line:#dfe3ea;       /* 罫・境界 */
    --paper:#f7f6f2;      /* 紙の地 */
    --card:#ffffff;
    --accent:#e0533d;     /* 朱：ここぞの一点だけ */
    --accent-soft:#fbeae6;
    --calm:#3f7d6e;       /* 図の補助色（落ち着いた緑） */
    --calm-soft:#e6f0ec;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Zen Kaku Gothic New',sans-serif;
    color:var(--ink);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    margin:0; line-height:1.8;
  }
  .maru{font-family:'Zen Maru Gothic',sans-serif;}
  .tnum{font-feature-settings:"tnum";}
  /* やわらかい角丸を全体の通奏低音にする（思想：現実に90°はない） */
  .soft{border-radius:18px;}
  .softer{border-radius:26px;}
  .card-shadow{box-shadow:0 1px 2px rgba(26,29,36,.04),0 8px 24px -12px rgba(26,29,36,.12);}
  .chip{transition:all .18s ease;}
  .chip:active{transform:scale(.96);}
  .tipcard{transition:transform .2s ease, box-shadow .2s ease;}
  .tipcard:hover{transform:translateY(-3px);box-shadow:0 4px 8px rgba(26,29,36,.05),0 18px 40px -16px rgba(26,29,36,.22);}
  ::selection{background:var(--accent-soft);}
  .focusable:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  .fade-in{animation:fade .5s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
</style>
</head>
<body>

<!-- ヘッダー / ヒーロー -->
<header class="px-6 pt-14 pb-10 md:pt-20 md:pb-14 max-w-5xl mx-auto">
  <div class="flex items-baseline gap-3">
    <h1 class="maru font-bold leading-none" style="font-size:clamp(3.2rem,11vw,5.5rem);letter-spacing:-.02em">zu</h1>
    <span class="inline-block w-2.5 h-2.5 rounded-full mb-2" style="background:var(--accent)"></span>
  </div>

  <p class="maru mt-1 font-bold" style="font-size:clamp(1.1rem,3.5vw,1.5rem);color:var(--ink)">
    伝わりやすい形について
  </p>

  <p class="mt-6 max-w-2xl text-base md:text-lg" style="color:var(--ink-soft)">
    スライドでも資料でもチャットの投稿でも、見せて伝えるものはぜんぶ「図」。<br>
    その図を、もう少し伝わりやすくするためのコツを集めた場所です。<br>
    長くメモしてきたものを、少しずつここに開いています。使えそうなものがあれば、どうぞ持っていってください。
  </p>

  <!-- 思想の核を一文で。数字ではなく比喩で開く -->
  <div class="mt-8 p-5 md:p-6 soft" style="background:var(--calm-soft)">
    <p class="text-sm md:text-base" style="color:#2c5249">
      理解に1分かかる図を30秒にできたら。120人が見れば、それだけで1時間が生まれます。
      見た目は枝葉ではなく、人が人に伝えるための本質です。
    </p>
  </div>
</header>

<!-- 検索 + カテゴリ -->
<div class="px-6 max-w-5xl mx-auto sticky top-0 z-20 pt-2 pb-4" style="background:linear-gradient(var(--paper) 70%,transparent)">
  <div class="relative">
    <i data-lucide="search" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2" style="color:var(--ink-soft)"></i>
    <input id="q" type="text" placeholder="キーワードで探す（例：余白、角丸、色）"
      class="focusable w-full pl-12 pr-4 py-3.5 soft border bg-white text-base"
      style="border-color:var(--line)">
  </div>
  <div id="cats" class="flex flex-wrap gap-2 mt-3"></div>
</div>

<!-- Tips一覧 -->
<main class="px-6 max-w-5xl mx-auto pb-8">
  <div id="count" class="text-sm mb-4" style="color:var(--ink-soft)"></div>
  <div id="grid" class="grid gap-5 md:grid-cols-2"></div>
  <div id="empty" class="hidden text-center py-16" style="color:var(--ink-soft)">
    <i data-lucide="telescope" class="w-8 h-8 mx-auto mb-3"></i>
    <p>覚え書きが見つかりませんでした。別の言葉で探してみてください。</p>
  </div>
</main>

<!-- フッター -->
<footer class="px-6 py-14 mt-6" style="background:var(--ink);color:#cfd4dd">
  <div class="max-w-2xl mx-auto flex items-center justify-between gap-4">
    <p class="text-xs" style="color:#7c8492">craftpaperbag</p>

      <path d="M60 60 Q78 70 96 60" fill="none" stroke="var(--ink-soft)" stroke-width="2"/>
      <text x="78" y="108" text-anchor="middle" font-size="11" fill="var(--ink-soft)">引き伸ばす</text>
      <circle cx="242" cy="50" r="30" fill="none" stroke="var(--calm)" stroke-width="2"/>
      <circle cx="232" cy="44" r="3.5" fill="var(--calm)"/>
      <circle cx="252" cy="44" r="3.5" fill="var(--calm)"/>
      <path d="M230 58 Q242 67 254 58" fill="none" stroke="var(--calm)" stroke-width="2"/>
      <text x="242" y="108" text-anchor="middle" font-size="11" fill="var(--calm)">比率を保つ</text>
    </svg>`,
    apply:"画像のサイズ変更は、必ず縦横の比率を保つ。収まらないときはトリミングで合わせる。",
    term:"",
  },
  {
    id:"no-filler",
    cat:"draw",
    tags:["space"],
    title:"余白埋めのイラストは、置かない",
    claim:"隙間を埋めるだけのイラストは、ノイズ。",
    why:"話の合間に意味のない相づちを挟み続けられると、肝心の用件が頭に入ってきません。余白も同じで、空いているからと挿絵で埋めると、視線がそちらに引かれ、本当の主役が弱まります。余白は埋めるものではなく、主役を呼吸させるために残しておくものです。",
    visual:`<svg viewBox="0 0 320 120" class="w-full" role="img" aria-label="隙間を挿絵で埋めるより、余白をそのまま残したほうが主役が立つ">
      <rect x="20" y="20" width="116" height="72" rx="10" fill="none" stroke="var(--line)"/>
      <rect x="28" y="28" width="58" height="9" rx="3" fill="var(--ink-soft)"/>
      <g fill="var(--line)">
        <rect x="28" y="48" width="100" height="6" rx="2"/>
        <rect x="28" y="60" width="100" height="6" rx="2"/>
        <rect x="28" y="72" width="62" height="6" rx="2"/>
      </g>
      <g fill="var(--ink-soft)" opacity=".7">
        <path d="M116 26 l1.6 4.2 l4.2 1.6 l-4.2 1.6 l-1.6 4.2 l-1.6 -4.2 l-4.2 -1.6 l4.2 -1.6 Z"/>
      </g>
      <g fill="none" stroke="var(--ink-soft)" stroke-width="1.5" opacity=".7">
        <circle cx="118" cy="74" r="5"/>
        <path d="M100 74 q3 -5 6 0 t6 0"/>
      </g>
      <text x="78" y="108" text-anchor="middle" font-size="11" fill="var(--ink-soft)">隙間を埋める</text>
      <rect x="184" y="20" width="116" height="72" rx="10" fill="none" stroke="var(--line)"/>
      <rect x="192" y="28" width="58" height="9" rx="3" fill="var(--calm)"/>
      <g fill="var(--calm-soft)">
        <rect x="192" y="48" width="100" height="6" rx="2"/>
        <rect x="192" y="60" width="100" height="6" rx="2"/>
        <rect x="192" y="72" width="62" height="6" rx="2"/>
      </g>
      <text x="242" y="108" text-anchor="middle" font-size="11" fill="var(--calm)">余白を活かす</text>
    </svg>`,
    apply:"隙間を埋めるためだけの挿絵は置かない。余白はそのまま主役のために残す。",
    term:"",
  },
];

/* 5カテゴリの配列を1本につなぐ。順序はカテゴリ体系の並びに合わせる。 */
const TIPS = [].concat(
  typeof TIPS_space     !== "undefined" ? TIPS_space     : [],
  typeof TIPS_hierarchy !== "undefined" ? TIPS_hierarchy : [],
  typeof TIPS_color     !== "undefined" ? TIPS_color     : [],
  typeof TIPS_text      !== "undefined" ? TIPS_text      : [],
  typeof TIPS_draw      !== "undefined" ? TIPS_draw      : []
);
/* =========================================================
   ▲▲▲ たねは以上。以下は描画ロジック（基本さわらない） ▲▲▲
   ========================================================= */

let activeCat = "all";
let keyword = "";
const catLabel = id => (CATEGORIES.find(c=>c.id===id)||{}).label || "";
const catIcon  = id => (CATEGORIES.find(c=>c.id===id)||{}).icon  || "tag";

function renderCats(){
  const wrap = document.getElementById("cats");
  const mk = (id,label,icon,on)=>`
    <button data-cat="${id}" class="chip focusable inline-flex items-center gap-1.5 px-3.5 py-2 soft text-sm border"
      style="${on
        ? 'background:var(--ink);color:#fff;border-color:var(--ink)'
        : 'background:#fff;color:var(--ink);border-color:var(--line)'}">
      <i data-lucide="${icon}" class="w-4 h-4"></i>${label}
    </button>`;
  wrap.innerHTML =
    mk("all","すべて","layout-grid",activeCat==="all") +
    CATEGORIES.map(c=>mk(c.id,c.label,c.icon,activeCat===c.id)).join("");
  wrap.querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{activeCat=b.dataset.cat;renderCats();renderGrid();};
  });
  lucide.createIcons();
}

function match(t){
  const okCat = activeCat==="all" || t.cat===activeCat;
  const k = keyword.trim();
  const hay = (t.title+t.claim+t.why+t.apply+t.term+catLabel(t.cat)+(t.tags||[]).map(catLabel).join("")+(t.tags||[]).join("")).toLowerCase();
  const okKey = !k || hay.includes(k.toLowerCase());
  return okCat && okKey;
}

function tagChips(t){
  const tags = t.tags || [];
  if(!tags.length) return "";
  return `<div class="px-5 pb-1 flex flex-wrap gap-1.5">` + tags.map(tg=>`
    <button data-jump="${tg}" class="chip focusable inline-flex items-center gap-1 px-2 py-0.5 soft text-[11px] border"
      style="background:var(--paper);color:var(--ink-soft);border-color:var(--line)">
      <i data-lucide="${catIcon(tg)}" class="w-3 h-3"></i>${catLabel(tg)}
    </button>`).join("") + `</div>`;
}

function card(t){
  return `<article class="tipcard fade-in soft card-shadow overflow-hidden" style="background:var(--card)">
    <div class="px-5 pt-4 flex items-center gap-1.5 text-xs" style="color:var(--ink-soft)">
      <i data-lucide="${catIcon(t.cat)}" class="w-3.5 h-3.5"></i>${catLabel(t.cat)}
    </div>
    <h3 class="maru font-bold px-5 mt-1" style="font-size:1.25rem">${t.title}</h3>
    <p class="px-5 mt-1 text-sm" style="color:var(--accent)">${t.claim}</p>
    <div class="mx-5 my-3 p-3 soft" style="background:var(--paper)">${t.visual}</div>
    <p class="px-5 text-sm leading-relaxed" style="color:var(--ink)">${t.why}</p>
    <div class="px-5 mt-3 pb-1 flex items-start gap-2">
      <i data-lucide="check" class="w-4 h-4 mt-1 shrink-0" style="color:var(--calm)"></i>
      <p class="text-sm" style="color:var(--ink-soft)">${t.apply}</p>
    </div>
    ${tagChips(t)}
    ${t.term?`<p class="px-5 pb-4 pt-2 text-xs" style="color:#9aa0ab">用語：${t.term}</p>`:`<div class="pb-4"></div>`}
  </article>`;
}

function renderGrid(){
  const list = TIPS.filter(match);
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const count = document.getElementById("count");
  grid.innerHTML = list.map(card).join("");
  empty.classList.toggle("hidden", list.length>0);
  count.textContent = `${list.length} 件の覚え書き`;
  grid.querySelectorAll("button[data-jump]").forEach(b=>{
    b.onclick=()=>{activeCat=b.dataset.jump;keyword="";document.getElementById("q").value="";renderCats();renderGrid();window.scrollTo({top:0,behavior:"smooth"});};
  });
  lucide.createIcons();
}

document.getElementById("q").addEventListener("input",e=>{keyword=e.target.value;renderGrid();});
renderCats();
renderGrid();
lucide.createIcons();
</script>
</body>
</html>
